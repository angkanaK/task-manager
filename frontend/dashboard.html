<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container" style="max-width: 600px;">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h1>Task Manager</h1>
                <button onclick="logout()" style="width:auto; padding: 8px 16px;">ออกจากระบบ</button>
            </div>
            <h2 id="welcome-msg"></h2>

            <div style="display:flex; gap:8px; margin-bottom:16px;">
                <input type="text" id="task-title" placeholder="ชื่อ Task" style="margin-bottom:0"/>
                <button onclick="createTask()" style="width:auto; padding: 8px 16px; margin-bottom:0">เพิ่ม</button>
            </div>

            <div id="task-list"></div>
        </div>
    </div>
    <script src="js/tasks.js"></script>

    <div id="edit-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center;">
    <div class="card" style="max-width:400px;">
        <h2>แก้ไข Task</h2>
        <input type="text" id="edit-title" placeholder="ชื่อ Task" />
        <button onclick="saveEdit()">บันทึก</button>
        <button onclick="closeEdit()" style="background-color:#999;">ยกเลิก</button>
    </div>
</div>

</body>
</html>
